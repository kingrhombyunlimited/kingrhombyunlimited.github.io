<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Page</title>

<style>

body{
    margin:0;
    background:#000;
    color:#fff;
    font-family: Arial, Helvetica, sans-serif;
}

/* MAIN LAYOUT */
.page{
    display:flex;
    gap:20px;
    padding:20px;
}

/* LEFT SIDE */
.left{
    flex:1;
    min-width:300px;
}

/* RIGHT SIDE */
.right{
    width:420px;
    max-width:34vw;
}

/* STACK ON MOBILE */
@media(max-width:900px){
    .page{
        flex-direction:column;
    }

    .right{
        width:100%;
        max-width:100%;
    }
}

/* MAIN VIDEO */
.video{
    width:100%;
    aspect-ratio:16/9;
    position:relative;
}

.video iframe{
    position:absolute;
    width:100%;
    height:100%;
    border:0;
}

/* INDEX LABEL */
.label{
    text-align:center;
    margin:10px 0 20px 0;
    color:#00ff88;
}

/* IMAGE GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:14px;
}

@media(max-width:900px){
    .grid{
        grid-template-columns:repeat(2,1fr);
    }
}

.tile{
    background:#fff;
    aspect-ratio:4/3;
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

.tile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* RIGHT SIDE VIDEO BLOCKS */

.stack{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.block{
    width:100%;
    aspect-ratio:16/9;
    position:relative;
}

.block iframe{
    position:absolute;
    width:100%;
    height:100%;
    border:0;
}

/* FULLSCREEN IMAGE VIEWER */

.viewer{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.viewer img{
    max-width:90vw;
    max-height:90vh;
    object-fit:contain;
}

.closeBtn{
    position:absolute;
    top:20px;
    right:30px;
    font-size:40px;
    cursor:pointer;
}

.nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:50px;
    cursor:pointer;
    padding:20px;
    user-select:none;
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

</style>
</head>

<body>

<div class="page">

<!-- LEFT CONTENT -->
<div class="left">

<div class="video">
<iframe
src="https://www.youtube.com/embed/TOrnUquxtwA"
allowfullscreen>
</iframe>
</div>

<div class="label">index.html</div>

<div class="grid">

<div class="tile"><img src="https://kingrhombyunlimited.github.io/legalphoto1.png"></div>
<div class="tile"><img src="https://kingrhombyunlimited.github.io/legalphoto2.png"></div>
<div class="tile"><img src="https://kingrhombyunlimited.github.io/legalphoto3.png"></div>
<div class="tile"><img src="https://kingrhombyunlimited.github.io/legalphoto4.png"></div>

<div class="tile"><img src="https://kingrhombyunlimited.github.io/legalphoto5.png"></div>
<div class="tile"><img src="https://kingrhombyunlimited.github.io/legalphoto6.png"></div>
<div class="tile"><img src="https://kingrhombyunlimited.github.io/legalphoto7.png"></div>
<div class="tile"><img src="https://kingrhombyunlimited.github.io/legalphoto8.png"></div>

</div>
</div>


<!-- RIGHT SIDE -->
<div class="right">

<!-- URL HERE FOR RIGHTSIDE -->
<iframe
src="https://kingrhombyunlimited.github.io/testvid.html"
style="width:100%; height:100vh; border:0;">
</iframe>

</div>

</div>


<!-- FULLSCREEN VIEWER -->
<div class="viewer" id="viewer">

<div class="closeBtn" id="closeViewer">✕</div>

<div class="nav prev" id="prevImg">&#10094;</div>
<div class="nav next" id="nextImg">&#10095;</div>

<img id="viewerImg">

</div>


<script>

const images = document.querySelectorAll(".grid img");
const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

let index = 0;

images.forEach((img,i)=>{

    img.addEventListener("click",()=>{
        index=i;
        openViewer();
    });

});

function openViewer(){
    viewer.style.display="flex";
    viewerImg.src = images[index].src;
}

function closeViewer(){
    viewer.style.display="none";
}

function nextImage(){
    index++;
    if(index >= images.length) index=0;
    viewerImg.src = images[index].src;
}

function prevImage(){
    index--;
    if(index < 0) index = images.length-1;
    viewerImg.src = images[index].src;
}

document.getElementById("closeViewer").onclick = closeViewer;
document.getElementById("nextImg").onclick = nextImage;
document.getElementById("prevImg").onclick = prevImage;

viewer.onclick = function(e){
    if(e.target === viewer) closeViewer();
}

document.addEventListener("keydown",function(e){

    if(viewer.style.display === "flex"){

        if(e.key === "Escape") closeViewer();
        if(e.key === "ArrowRight") nextImage();
        if(e.key === "ArrowLeft") prevImage();

    }

});

</script>

</body>
</html>
