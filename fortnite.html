<!DOCTYPE html>
<html>
<head>

<style>

body{
    background:black;
    color:white;
    font-family:Arial;
    text-align:center;
}

/* NORMAL MODE */
.iframe-normal{
    width:60%;
    aspect-ratio:16/9;
    margin:auto;
    display:block;
    transition:0.4s;
}

/* THEATER MODE */
.iframe-theater{
    width:80%;
}

/* BUTTON */
.theater-btn{
    margin:15px;
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}

    .video-wrap{
    position:relative;
    width:60%;
    margin:auto;
    padding-top:56.25%;
}

.video-wrap iframe{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

</style>

<script>

function toggleTheater(){

    let iframes = document.querySelectorAll("iframe");

    iframes.forEach(frame => {

        frame.classList.toggle("iframe-theater");

    });

}

</script>

</head>

<body>

<h1>My Fortnite Videos</h1>

<button class="theater-btn" onclick="toggleTheater()">
Toggle Theater Mode
</button>

<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/EfYYHd2RRIg"></iframe>
</div>

<br><br>

<div class="video-wrap">
<iframe src="https://www.youtube.com/embed/EWU0lJVwyLk"></iframe>
</div>

    <br><br>

</div>

<iframe src="https://www.youtube.com/embed/OTMgBoMWmJM"></iframe>
</div>

</div>

</body>
</html>
